version: "3.9"

services:
  minecraft:
    image: itzg/minecraft-server
    container_name: mc
    restart: unless-stopped

    ports:
      - "25565:25565"

    environment:
      EULA: "TRUE"
      TYPE: "VANILLA"
      VERSION: "LATEST"
      MEMORY: "5G"
      VIEW_DISTANCE: "12"
      ENABLE_RCON: "true"
      RCON_PASSWORD: "${RCON_PASSWORD}"
      RCON_PORT: "25575"
      ONLINE_MODE: "false"

    volumes:
      - ../minecraft-data:/data
